services:
  - type: worker
    name: video-scraper-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CHANNEL_USERNAME
        value: "@YourChannel"
      - key: CHANNEL_ID
        value: "-1001234567890"
      - key: ADMIN_IDS
        value: "123456789"
      - key: NODE_ENV
        value: production
